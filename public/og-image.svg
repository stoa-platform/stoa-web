<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(99, 102, 241, 0.1)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="530" r="200" fill="rgba(99, 102, 241, 0.15)" filter="url(#glow)"/>
  <circle cx="1100" cy="100" r="250" fill="rgba(139, 92, 246, 0.1)" filter="url(#glow)"/>
  <circle cx="900" cy="500" r="150" fill="rgba(168, 85, 247, 0.08)" filter="url(#glow)"/>
  
  <!-- Decorative lines -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3"/>
  <line x1="800" y1="430" x2="1200" y2="430" stroke="url(#accentGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Logo placeholder - Greek temple icon -->
  <g transform="translate(100, 230)">
    <!-- Temple base -->
    <rect x="0" y="140" width="120" height="15" rx="2" fill="url(#accentGradient)"/>
    <rect x="-10" y="150" width="140" height="10" rx="2" fill="url(#accentGradient)" opacity="0.8"/>
    
    <!-- Columns -->
    <rect x="10" y="50" width="15" height="90" rx="2" fill="url(#accentGradient)"/>
    <rect x="35" y="50" width="15" height="90" rx="2" fill="url(#accentGradient)"/>
    <rect x="70" y="50" width="15" height="90" rx="2" fill="url(#accentGradient)"/>
    <rect x="95" y="50" width="15" height="90" rx="2" fill="url(#accentGradient)"/>
    
    <!-- Roof -->
    <polygon points="60,0 -15,50 135,50" fill="url(#accentGradient)"/>
    <polygon points="60,10 0,50 120,50" fill="#1e1b4b"/>
    
    <!-- Column caps -->
    <rect x="5" y="45" width="25" height="8" rx="1" fill="url(#accentGradient)"/>
    <rect x="30" y="45" width="25" height="8" rx="1" fill="url(#accentGradient)"/>
    <rect x="65" y="45" width="25" height="8" rx="1" fill="url(#accentGradient)"/>
    <rect x="90" y="45" width="25" height="8" rx="1" fill="url(#accentGradient)"/>
  </g>

  <!-- Main title -->
  <text x="280" y="290" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white">STOA</text>
  <text x="280" y="365" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#a5b4fc">Platform</text>
  
  <!-- Tagline -->
  <text x="280" y="440" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#e2e8f0">API &amp; MCP Gateway for the AI Era</text>
  
  <!-- Features badges -->
  <g transform="translate(280, 480)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="60" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">eBPF-native</text>
    
    <rect x="140" y="0" width="100" height="36" rx="18" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="190" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">CLI-first</text>
    
    <rect x="260" y="0" width="110" height="36" rx="18" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="315" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">AI-ready</text>
    
    <rect x="390" y="0" width="130" height="36" rx="18" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="455" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="500" fill="#a5b4fc" text-anchor="middle">Open Source</text>
  </g>

  <!-- URL -->
  <text x="280" y="570" font-family="Inter, monospace" font-size="20" font-weight="400" fill="#64748b">gostoa.dev</text>
  
  <!-- Decorative code snippet -->
  <g transform="translate(800, 180)" opacity="0.6">
    <rect x="0" y="0" width="320" height="200" rx="12" fill="rgba(15, 23, 42, 0.8)" stroke="#334155" stroke-width="1"/>
    
    <!-- Window controls -->
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#eab308"/>
    <circle cx="60" cy="20" r="6" fill="#22c55e"/>
    
    <!-- Code lines -->
    <text x="20" y="60" font-family="JetBrains Mono, monospace" font-size="12" fill="#6366f1">$ stoa init my-gateway</text>
    <text x="20" y="85" font-family="JetBrains Mono, monospace" font-size="12" fill="#22c55e">✓ Gateway created</text>
    <text x="20" y="115" font-family="JetBrains Mono, monospace" font-size="12" fill="#6366f1">$ stoa mcp add stripe</text>
    <text x="20" y="140" font-family="JetBrains Mono, monospace" font-size="12" fill="#22c55e">✓ MCP server connected</text>
    <text x="20" y="170" font-family="JetBrains Mono, monospace" font-size="12" fill="#6366f1">$ stoa deploy</text>
  </g>
</svg>
